<!doctype html>

  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport ───────────────────────────────────────────────
         viewport-fit=cover: web content extends under the iOS notch /
         Android camera cutout. Safe-area env() vars are then used in CSS.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />

    <!-- ── Theme colour (address bar on Android Chrome) ──────── -->
    <meta name="theme-color" content="#1E1E2C" />

    <!-- ── iOS PWA / fullscreen meta ─────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wardle" />

    <!-- ── Favicon ───────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="./wardle-icon.svg" />

    <!-- ── Fonts (same as prototype) ─────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap"

    <style>
      /* ── Reset & shell styles ──────────────────────────────────
         These mirror the prototype's global styles but are expanded
         to handle safe-area insets on real devices.
      */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }

      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;         /* no bounce scroll on the shell itself */
        background: #1E1E2C;
        font-family: 'DM Sans', sans-serif;
        color: #EAF4F4;
        /* Prevent iOS text-size adjustment when rotating */
        -webkit-text-size-adjust: 100%;
      }

      #root {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
      }

      /* Scrollable screens inside the app handle their own overflow */
      .screen {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
      }

      /* Hide scrollbars (same as prototype) */
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
    </style>
