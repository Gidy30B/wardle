<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1E1E2C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Wardle" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/wardle-icon.png" />
    <title>Wardle</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      ;(() => {
        const isNativeRuntime = Boolean(
          window.Capacitor?.isNativePlatform?.(),
        )
        const isNativeAuthCallback =
          window.location.pathname === '/sso-callback' &&
          new URLSearchParams(window.location.search).get('native') === '1' &&
          !isNativeRuntime

        if (!isNativeAuthCallback) {
          return
        }

        window.location.replace(
          `app.wardle.medcase://sso-callback${window.location.search}${window.location.hash}`,
        )
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
